<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aporia</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap"
    rel="stylesheet"
  />

 
  <link rel="stylesheet" href="aporia.css" />
  <link rel="stylesheet" href="masthead.css" />

</head>
<body>
  <header class="navbar">
  <div class="nav-container">
     <a href="index.html" class="logo aporia-word">aporia</a>

  <nav class="nav-links">
  <a href="about.html">About</a>
  <!--<a href="masthead/masthead.html">Masthead</a>-->
  <a href="publications.html">Publications</a>
  <a href="submit.html">Submit</a>
  <a href="contact.html">Contact</a>
</nav>
  </div>
</header>

<section class="page-banner">
  <img src="/images/your-banner.jpg" alt="Banner image" class="page-banner-image" />
  <div class="page-banner-overlay"></div>

  <div class="page-banner-content">
    <p class="page-banner-kicker">Aporia</p>
    <h1 class="page-banner-title">Masthead</h1>
  </div>
</section>

    <section class="masthead-grid-section">
      <div class="container">
        <div class="masthead-grid">
          <!-- Card 1 -->
          <button
            class="masthead-card"
            data-name="Lilah Warren"
            data-position="Editor-in-Chief"
            data-bio="Lilah is a poet and visual artist exploring themes of identity, displacement, and belonging. Her work has been featured in several Canadian literary journals, and she brings a thoughtful, interdisciplinary vision to the editorial team."
            data-image="/images/lilah.jpg"
          >
            <img src="/images/lilah.jpg" alt="Lilah Warren" />
            <div class="masthead-overlay"></div>
            <div class="masthead-card-text">
              <h3>Lilah Warren</h3>
              <p>Editor-in-Chief</p>
            </div>
          </button>

          <!-- Card 2 -->
          <button
            class="masthead-card"
            data-name="Amy Savciuc"
            data-position="Managing Editor"
            data-bio="Amy works across editing and publishing operations, with a particular interest in youth narrative, literary curation, and building sustainable creative communities."
            data-image="/images/amy.jpg"
          >
            <img src="/images/amy.jpg" alt="Amy Savciuc" />
            <div class="masthead-overlay"></div>
            <div class="masthead-card-text">
              <h3>Amy Savciuc</h3>
              <p>Managing Editor</p>
            </div>
          </button>

          <!-- Card 3 -->
          <button
            class="masthead-card"
            data-name="Jacky Tang"
            data-position="Poetry Editor"
            data-bio="Jacky is interested in lyrical form, fragmentation, and the emotional architecture of language. He is especially drawn to work that takes formal risks."
            data-image="/images/jacky.jpg"
          >
            <img src="/images/jacky.jpg" alt="Jacky Tang" />
            <div class="masthead-overlay"></div>
            <div class="masthead-card-text">
              <h3>Jacky Tang</h3>
              <p>Poetry Editor</p>
            </div>
          </button>

          <!-- Card 4 -->
          <button
            class="masthead-card"
            data-name="Teresa Wu"
            data-position="Art Director"
            data-bio="Teresa is a designer and illustrator focused on visual storytelling, print culture, and editorial identity. She shapes the visual language of each issue."
            data-image="/images/teresa.jpg"
          >
            <img src="/images/teresa.jpg" alt="Teresa Wu" />
            <div class="masthead-overlay"></div>
            <div class="masthead-card-text">
              <h3>Teresa Wu</h3>
              <p>Art Director</p>
            </div>
          </button>

          <!-- Card 5 -->
          <button
            class="masthead-card"
            data-name="Isabella Torres"
            data-position="Fiction Editor"
            data-bio="Isabella is drawn to intimate fiction that explores memory, family, and cultural inheritance. She loves prose that is both precise and emotionally alive."
            data-image="/images/isabella.jpg"
          >
            <img src="/images/isabella.jpg" alt="Isabella Torres" />
            <div class="masthead-overlay"></div>
            <div class="masthead-card-text">
              <h3>Isabella Torres</h3>
              <p>Fiction Editor</p>
            </div>
          </button>

          <!-- Card 6 -->
          <button
            class="masthead-card"
            data-name="Caden Baghbani"
            data-position="Nonfiction Editor"
            data-bio="Caden works with essays and criticism that engage deeply with politics, place, and lived experience. He values clarity, argument, and voice."
            data-image="/images/caden.jpg"
          >
            <img src="/images/caden.jpg" alt="Caden Baghbani" />
            <div class="masthead-overlay"></div>
            <div class="masthead-card-text">
              <h3>Caden Baghbani</h3>
              <p>Nonfiction Editor</p>
            </div>
          </button>

          <!-- Card 7 -->
          <button
            class="masthead-card"
            data-name="Amin Shirazi"
            data-position="Visual Arts Editor"
            data-bio="Amin is interested in contemporary visual culture, mixed media practice, and work that sits between image, text, and archive."
            data-image="/images/amin.jpg"
          >
            <img src="/images/amin.jpg" alt="Amin Shirazi" />
            <div class="masthead-overlay"></div>
            <div class="masthead-card-text">
              <h3>Amin Shirazi</h3>
              <p>Visual Arts Editor</p>
            </div>
          </button>

          <!-- Card 8 -->
          <button
            class="masthead-card"
            data-name="Shaza Khattab"
            data-position="Communications Lead"
            data-bio="Shaza works across outreach, audience development, and partnerships. She cares about making literary spaces more accessible and public-facing."
            data-image="/images/shaza.jpg"
          >
            <img src="/images/shaza.jpg" alt="Shaza Khattab" />
            <div class="masthead-overlay"></div>
            <div class="masthead-card-text">
              <h3>Shaza Khattab</h3>
              <p>Communications Lead</p>
            </div>
          </button>
        </div>
      </div>
    </section>
  </main>

  <!-- Popup Modal -->
  <div class="masthead-modal" id="mastheadModal" aria-hidden="true">
    <div class="masthead-modal-backdrop" id="mastheadBackdrop"></div>

    <div class="masthead-modal-content" role="dialog" aria-modal="true" aria-labelledby="modalName">
      <button class="masthead-modal-close" id="mastheadClose" aria-label="Close popup">
      </button>

      <div class="masthead-modal-grid">
        <div class="masthead-modal-image-wrap">
          <img id="modalImage" src="" alt="" />
        </div>

        <div class="masthead-modal-text">
          <p class="modal-position-label">Masthead</p>
          <h2 id="modalName"></h2>
          <h3 id="modalPosition"></h3>
          <p id="modalBio"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="
  script.js"></script>
</body>
</html>
